<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Stackly | Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Preloader Container - CHANGE BACKGROUND COLOR HERE */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ===== CHANGE THIS COLOR ===== */
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8dc 100%);
            /* Alternative colors you can use:
               background: #ffffff; (white)
               background: #1a1a2e; (dark)
               background: linear-gradient(135deg, #667eea, #764ba2); (purple gradient)
               background: #fef7e0; (warm yellow)
               background: #e6f7e6; (light green)
            */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        /* Preloader Content */
        .preloader-content {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        /* Logo Animation */
        .logo {
            margin-bottom: 30px;
            animation: bounce 1s ease infinite;
        }

        .logo img {
            width: 120px;
            height: auto;
            object-fit: contain;
        }

        /* Loading Text */
        .loading-text {
            font-size: 18px;
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* Progress Bar Container */
        .progress-container {
            width: 280px;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        /* Progress Bar */
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8c42);
            border-radius: 10px;
            animation: loading 2.5s ease forwards;
        }

        /* Percentage Text */
        .percentage {
            font-size: 14px;
            color: #a0aec0;
            margin-top: 12px;
            font-weight: 500;
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: pulse 1.4s ease infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Tagline */
        .tagline {
            margin-top: 30px;
            font-size: 12px;
            color: #08090a;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes loading {
            0% {
                width: 0%;
            }
            20% {
                width: 15%;
            }
            40% {
                width: 35%;
            }
            60% {
                width: 65%;
            }
            80% {
                width: 85%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Fade Out Animation */
        .preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo img {
                width: 100px;
            }
            
            .progress-container {
                width: 240px;
            }
            
            .loading-text {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .logo img {
                width: 80px;
            }
            
            .progress-container {
                width: 200px;
            }
            
            .loading-text {
                font-size: 14px;
            }
            
            .tagline {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

<div class="preloader" id="preloader">
    <div class="preloader-content">
        <!-- Logo -->
        <div class="logo">
            <img src="Stackly.webp" alt="Stackly" onerror="this.src='https://placehold.co/120x120/ff6b6b/white?text=STACKLY'">
        </div>
        
        <!-- Loading Text -->
        <div class="loading-text">Loading</div>
        
        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <!-- Percentage -->
        <div class="percentage" id="percentage">0%</div>
        
        <!-- Loading Dots -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <!-- Tagline -->
        <div class="tagline">Your e-commerce destination</div>
    </div>
</div>

<script>
    // Wait for page to fully load
    window.addEventListener('load', function() {
        const preloader = document.getElementById('preloader');
        const percentageElement = document.getElementById('percentage');
        const progressBar = document.getElementById('progressBar');
        
        let percentage = 0;
        
        // Simulate loading progress
        const interval = setInterval(function() {
            if (percentage < 100) {
                percentage += Math.floor(Math.random() * 10) + 1;
                if (percentage > 100) percentage = 100;
                percentageElement.textContent = percentage + '%';
            } else {
                clearInterval(interval);
            }
        }, 150);
        
        // Wait for actual content to load, then redirect
        setTimeout(function() {
            preloader.classList.add('fade-out');
            
            // Redirect to home.html after fade out
            setTimeout(function() {
                window.location.href = 'home.html';
            }, 500);
        }, 2500);
    });
    
    // Fallback: If page loads faster, still show preloader for minimum duration
    let minLoadTime = 2000;
    let startTime = Date.now();
    
    window.addEventListener('load', function() {
        let elapsedTime = Date.now() - startTime;
        let remainingTime = Math.max(0, minLoadTime - elapsedTime);
        
        setTimeout(function() {
            const preloader = document.getElementById('preloader');
            preloader.classList.add('fade-out');
            
            setTimeout(function() {
                window.location.href = 'home.html';
            }, 500);
        }, remainingTime);
    });
</script>

</body>
</html>
