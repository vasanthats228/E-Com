<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>404 · Page Not Found | Stackly</title>
  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fef7f0 0%, #fff5ed 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    /* Animated Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(251, 100, 27, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(251, 100, 27, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Decorative Shopping Elements */
    body::after {
      content: '🛒';
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 80px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 550px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(251, 100, 27, 0.15);
      animation: fadeSlideUp 0.6s ease-out;
      position: relative;
      z-index: 1;
    }

    .container:hover {
      box-shadow: 0 30px 60px -12px rgba(251, 100, 27, 0.2);
      border-color: rgba(251, 100, 27, 0.25);
      transition: all 0.3s ease;
    }

    /* Shopping Bag Icon */
    .bag-icon {
      font-size: 4rem;
      color: #fb641b;
      margin-bottom: 16px;
      animation: softFloat 3s infinite ease-in-out;
      display: inline-block;
      filter: drop-shadow(0 0 12px rgba(251, 100, 27, 0.3));
    }

    .four04 {
      font-size: 96px;
      font-weight: 800;
      background: linear-gradient(135deg, #fb641b, #ff8c42, #ffaa66);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: 4px;
      animation: softFloat 3s infinite ease-in-out;
      display: inline-block;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.2s;
    }

    p {
      font-size: 16px;
      color: #6c757d;
      margin-bottom: 32px;
      font-weight: 400;
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.3s;
    }

    /* Status Badge */
    .status-badge {
      display: inline-block;
      background: rgba(251, 100, 27, 0.1);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #fb641b;
      margin-bottom: 20px;
      border: 1px solid rgba(251, 100, 27, 0.2);
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.15s;
    }

    .button-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.4s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fb641b;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(251, 100, 27, 0.25);
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
      min-width: 180px;
    }

    .btn i {
      font-size: 14px;
      transition: transform 0.2s ease;
    }

    .btn-home {
      background: #fb641b;
    }

    .btn-home:hover {
      background: #e05a16;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(251, 100, 27, 0.35);
    }

    .btn-home:hover i {
      transform: translateX(-4px);
    }

    .btn-prev {
      background: transparent;
      color: #fb641b;
      border: 1px solid rgba(251, 100, 27, 0.4);
      box-shadow: none;
    }

    .btn-prev:hover {
      background: rgba(251, 100, 27, 0.05);
      transform: translateY(-3px);
      border-color: #fb641b;
      color: #e05a16;
    }

    .btn-prev:hover i {
      transform: translateX(-4px);
    }

    /* Quick Links Section */
    .quick-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.5s;
      flex-wrap: wrap;
    }

    .quick-link {
      color: #8b9cb0;
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .quick-link i {
      font-size: 0.75rem;
      color: #fb641b;
    }

    .quick-link:hover {
      color: #fb641b;
      transform: translateY(-2px);
    }

    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes softFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 2.5rem 1.8rem;
      }
      
      .button-group {
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      
      .btn {
        width: 100%;
        max-width: 280px;
        padding: 12px 24px;
        font-size: 14px;
      }

      .four04 {
        font-size: 80px;
      }

      .bag-icon {
        font-size: 3rem;
      }

      h2 {
        font-size: 24px;
      }

      p {
        font-size: 14px;
        margin-bottom: 28px;
      }

      .quick-links {
        flex-wrap: wrap;
        gap: 16px;
      }
    }

    @media (max-width: 450px) {
      .container {
        padding: 2rem 1.5rem;
      }
      .four04 {
        font-size: 64px;
      }
      .bag-icon {
        font-size: 2.5rem;
      }
      h2 {
        font-size: 22px;
      }
      p {
        font-size: 13px;
        margin-bottom: 24px;
      }
      .btn {
        max-width: 260px;
        padding: 10px 20px;
        font-size: 13px;
      }
      .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
      }
      .quick-link {
        font-size: 0.75rem;
      }
    }

    @media (max-width: 350px) {
      .four04 {
        font-size: 52px;
      }
      h2 {
        font-size: 20px;
      }
      p {
        font-size: 12px;
      }
      .btn {
        max-width: 220px;
        padding: 8px 16px;
        font-size: 12px;
      }
    }

    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f5f0eb;
    }

    ::-webkit-scrollbar-thumb {
      background: #fb641b;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #e05a16;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Shopping Bag Icon -->
    <div class="bag-icon">
      <i class="fas fa-shopping-bag"></i>
    </div>
    
    <!-- Status Badge -->
    <div class="status-badge">
      <i class="fas fa-exclamation-triangle" style="margin-right: 6px;"></i> PAGE NOT FOUND
    </div>
    
    <!-- 404 with Gradient -->
    <div class="four04">404</div>
    <h2>Oops! Page Not Found</h2>
    <p>The product or page you're looking for seems to have wandered off. Let's get you back to shopping!</p>
    
    <div class="button-group">
      <a href="index.html" class="btn btn-home">
        <i class="fas fa-home"></i> Back to Home
      </a>
      
      <a href="javascript:history.back()" class="btn btn-prev">
        <i class="fas fa-arrow-left"></i> Go Back
      </a>
    </div>
    
    <!-- Quick Navigation Links -->
    <div class="quick-links">
      <a href="products.html" class="quick-link">
        <i class="fas fa-store"></i> Shop Now
      </a>
      <a href="javascript:void(0)" onclick="showReport()" class="quick-link">
        <i class="fas fa-flag"></i> Report Issue
      </a>
      <a href="support.html" class="quick-link">
        <i class="fas fa-headset"></i> Customer Support
      </a>
      <a href="javascript:void(0)" onclick="window.location.reload()" class="quick-link">
        <i class="fas fa-sync-alt"></i> Try Again
      </a>
    </div>
  </div>

  <script>
    function showReport() {
      alert('📝 Report Broken Link\n\nThank you for helping us improve Stackly!\n\nURL: ' + window.location.href + '\nTime: ' + new Date().toLocaleString() + '\n\nOur team will review this issue.');
    }
    
    // Console message
    console.log('%c🛍️ Stackly | 404 Error', 'color: #fb641b; font-size: 14px; font-weight: bold;');
    console.log('%cPage not found. If you believe this is an error, please contact support.', 'color: #6c757d; font-size: 12px;');
    
    // Keyboard shortcut: Alt + Left Arrow to go back
    document.addEventListener('keydown', function(e) {
      if (e.altKey && e.key === 'ArrowLeft') {
        e.preventDefault();
        window.history.back();
      }
    });
  </script>
</body>
</html>
