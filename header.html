<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Stackly Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding-top: 110px; /* Space for fixed header */
        }

        /* Navbar Styles - FIXED */
        .navbar {
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            width: 100%;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 110px;
            gap: 30px;
            width: 100%;
        }

        /* Logo Section - ENLARGED */
        .logo-section {
            display: flex;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .logo-section:hover {
            opacity: 0.85;
        }

        .logo-img {
            height: 90px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        /* Desktop Navigation - BOLDER Text Links */
        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 36px;
            flex: 1;
            justify-content: center;
        }

        .nav-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 16px;
            font-weight: 700;
            color: #2d3748;
            cursor: pointer;
            transition: color 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .nav-btn:hover {
            color: #ff6b6b;
        }

        /* Right Actions */
        .right-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        /* Login Button - BOLDER */
        .login-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 15px;
            font-weight: 700;
            color: #2d3748;
            cursor: pointer;
            transition: color 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-btn:hover {
            color: #ff6b6b;
        }

        /* Get Started Button - BOLDER */
        .getstarted-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 15px;
            font-weight: 700;
            color: #2d3748;
            cursor: pointer;
            transition: color 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .getstarted-btn:hover {
            color: #ff6b6b;
        }

        /* Hamburger Menu Icon - Mobile Only */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            padding: 8px;
            background: transparent;
            border: none;
            z-index: 1001;
        }

        .hamburger span {
            width: 28px;
            height: 2.5px;
            background: #4a5568;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
            background: #ff6b6b;
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
            background: #ff6b6b;
        }

        /* Mobile Menu - Full Screen Overlay */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100vh;
            background: #ffffff;
            z-index: 999;
            transition: left 0.4s ease-in-out;
            overflow-y: auto;
            padding-top: 120px;
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-nav-buttons {
            display: flex;
            flex-direction: column;
            padding: 20px 32px;
            gap: 20px;
        }

        .mobile-nav-btn {
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
            transition: color 0.2s;
            text-align: left;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            border-bottom: 1px solid #f0f0f0;
        }

        .mobile-nav-btn i {
            width: 28px;
            color: #ff6b6b;
            font-size: 20px;
        }

        .mobile-nav-btn:hover {
            color: #ff6b6b;
        }

        /* Mobile Action Buttons - Login & Get Started in Mobile Menu */
        .mobile-actions {
            display: none;
            flex-direction: column;
            gap: 15px;
            padding: 20px 32px;
            margin-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .mobile-login-btn, .mobile-getstarted-btn {
            background: none;
            border: none;
            padding: 14px 0;
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            text-align: left;
        }

        .mobile-login-btn i, .mobile-getstarted-btn i {
            width: 28px;
            color: #ff6b6b;
            font-size: 20px;
        }

        .mobile-login-btn:hover, .mobile-getstarted-btn:hover {
            color: #ff6b6b;
            transform: translateX(5px);
        }

        .mobile-getstarted-btn {
            background: #ff6b6b;
            color: white;
            justify-content: center;
            border-radius: 30px;
            padding: 12px;
            margin-top: 10px;
        }

        .mobile-getstarted-btn i {
            color: white;
        }

        .mobile-getstarted-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        /* Responsive - Mobile View */
        @media (max-width: 768px) {
            body {
                padding-top: 95px;
            }

            .nav-container {
                padding: 0 20px;
                height: 95px;
            }

            .nav-buttons {
                display: none;
            }

            .right-actions {
                display: none;
            }

            .hamburger {
                display: flex;
            }

            /* Increased Logo Size for Mobile */
            .logo-img {
                height: 75px;
            }

            /* Show mobile actions in menu */
            .mobile-actions {
                display: flex;
            }

            .mobile-menu {
                padding-top: 100px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding-top: 85px;
            }

            .nav-container {
                height: 85px;
                padding: 0 16px;
            }

            /* Even Larger Logo for Small Screens */
            .logo-img {
                height: 70px;
            }

            .mobile-nav-btn {
                font-size: 16px;
                padding: 10px 0;
            }

            .mobile-nav-btn i {
                font-size: 18px;
            }

            .mobile-login-btn, .mobile-getstarted-btn {
                font-size: 16px;
                padding: 12px 0;
            }

            .mobile-menu {
                padding-top: 90px;
            }
        }
    </style>
</head>
<body>

<!-- Navbar Only - FIXED -->
<nav class="navbar">
    <div class="nav-container">
        <!-- Left Side: Stackly.webp - ENLARGED LOGO -->
        <a href="index.html" class="logo-section">
            <img src="Stackly.webp" alt="Stackly Logo" class="logo-img" onerror="this.src='https://placehold.co/200x90/ff6b6b/white?text=STACKLY'">
        </a>

        <!-- Desktop Navigation Buttons -->
        <div class="nav-buttons">
            <button class="nav-btn" data-page="index">Home</button>
            <button class="nav-btn" data-page="products">Products</button>
            <button class="nav-btn" data-page="deals">Deals</button>
            <button class="nav-btn" data-page="support">Support</button>
            <button class="nav-btn" data-page="blog">Blog</button>
        </div>

        <!-- Desktop Right Actions -->
        <div class="right-actions">
            <button class="login-btn" id="loginBtn"><i class="fas fa-user"></i><span> Login</span></button>
            <button class="getstarted-btn" id="getStartedBtn"><i class="fas fa-rocket"></i><span> Get Started</span></button>
        </div>

        <!-- Hamburger Menu Icon (Mobile Only) -->
        <button class="hamburger" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</nav>

<!-- Mobile Full Screen Menu -->
<div class="mobile-menu" id="mobileMenu">
    <div class="mobile-nav-buttons">
        <button class="mobile-nav-btn" data-page="index"><i class="fas fa-home"></i> Home</button>
        <button class="mobile-nav-btn" data-page="products"><i class="fas fa-box"></i> Products</button>
        <button class="mobile-nav-btn" data-page="deals"><i class="fas fa-fire"></i> Deals</button>
        <button class="mobile-nav-btn" data-page="support"><i class="fas fa-headset"></i> Support</button>
        <button class="mobile-nav-btn" data-page="blog"><i class="fas fa-blog"></i> Blog</button>
    </div>
    
    <!-- Mobile Actions: Login & Get Started (appears only on mobile) -->
    <div class="mobile-actions">
        <button class="mobile-login-btn" id="mobileLoginBtn"><i class="fas fa-user"></i> Login</button>
        <button class="mobile-getstarted-btn" id="mobileGetStartedBtn"><i class="fas fa-rocket"></i> Get Started</button>
    </div>
</div>

<script>
    // Navigation Function - Redirect to respective pages
    function navigateTo(page) {
        const pageUrls = {
            home: 'index.html',
            products: 'products.html',
            deals: 'deals.html',
            support: 'support.html',
            blog: 'blog.html'
        };
        
        const url = pageUrls[page];
        if (url) {
            window.location.href = url;
        }
    }

    // Attach navigation to all nav buttons (desktop)
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const page = btn.getAttribute('data-page');
            if (page) {
                navigateTo(page);
            }
        });
    });

    // Attach navigation to mobile nav buttons
    document.querySelectorAll('.mobile-nav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const page = btn.getAttribute('data-page');
            if (page) {
                navigateTo(page);
                closeMobileMenu();
            }
        });
    });

    // Desktop Login Button
    const loginBtn = document.getElementById('loginBtn');
    if (loginBtn) {
        loginBtn.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
    }

    // Desktop Get Started Button
    const getStartedBtn = document.getElementById('getStartedBtn');
    if (getStartedBtn) {
        getStartedBtn.addEventListener('click', () => {
            window.location.href = 'signup.html';
        });
    }

    // Mobile Login Button
    const mobileLoginBtn = document.getElementById('mobileLoginBtn');
    if (mobileLoginBtn) {
        mobileLoginBtn.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
    }

    // Mobile Get Started Button
    const mobileGetStartedBtn = document.getElementById('mobileGetStartedBtn');
    if (mobileGetStartedBtn) {
        mobileGetStartedBtn.addEventListener('click', () => {
            window.location.href = 'signup.html';
        });
    }

    // Logo Redirect
    const logoSect = document.querySelector('.logo-section');
    if (logoSect) {
        logoSect.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    }

    // Mobile Menu Functions
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    function toggleMobileMenu() {
        if (hamburgerBtn) hamburgerBtn.classList.toggle('active');
        if (mobileMenu) mobileMenu.classList.toggle('active');
        document.body.style.overflow = mobileMenu && mobileMenu.classList.contains('active') ? 'hidden' : '';
    }

    function closeMobileMenu() {
        if (hamburgerBtn) hamburgerBtn.classList.remove('active');
        if (mobileMenu) mobileMenu.classList.remove('active');
        document.body.style.overflow = '';
    }

    if (hamburgerBtn) hamburgerBtn.addEventListener('click', toggleMobileMenu);

    // Close mobile menu when clicking outside
    document.addEventListener('click', function(e) {
        if (mobileMenu && mobileMenu.classList.contains('active')) {
            if (!hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                closeMobileMenu();
            }
        }
    });

    // Handle window resize - close mobile menu on desktop view
    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            closeMobileMenu();
        }
    });
</script>

</body>
</html>
